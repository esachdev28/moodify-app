<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodify - Chat Companion</title>
  <link rel="stylesheet" href="styles/style.css" />

  <style>
    /* PAGE SPECIFIC STYLES */
    .chatwrapper {
      max-width: 960px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid rgba(133, 115, 106, 0.15);
      border-radius: 36px;
      padding: 3rem;
      box-shadow: 0 40px 100px -15px rgba(0, 0, 0, 0.08);
      margin-top: 4.5rem;
    }

    .mainheading {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      font-family: "Newsreader", serif;
      text-align: center;
    }

    .subtitletext {
      color: #53443c;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    #chat-box {
      background: #fbf9f5;
      border-radius: 24px;
      height: 580px;
      overflow-y: auto;
      padding: 2.8rem;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(133, 115, 106, 0.15);
    }

    .message {
      max-width: 82%;
      padding: 1.1rem 1.6rem;
      border-radius: 22px;
      line-height: 1.65;
      font-size: 1.05rem;
    }

    .message.user {
      background: #884d27;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
      box-shadow: 0 6px 16px rgba(136, 77, 39, 0.1);
    }

    .message.bot {
      background: #ffffff;
      color: #1b1c1a;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
      border: 1px solid rgba(133, 115, 106, 0.15);
    }

    .inputarea {
      display: flex;
      gap: 1rem;
      position: relative;
    }

    #chat-input {
      width: 100%;
      padding: 1rem 1.6rem;
      border-radius: 16px;
      border: 1px solid rgba(133, 115, 106, 0.15);
      background: #ffffff;
      padding-right: 120px;
    }

    #send-btn {
      position: absolute;
      right: 6px;
      top: 6px;
      height: calc(100% - 12px);
      padding: 0 1.6rem;
      border-radius: 10px;
      box-shadow: none;
    }

    /* TYPING DOTS */
    .typingindicator {
      display: flex;
      gap: 7px;
      padding: 1.1rem 1.6rem;
      background: #ffffff;
      border-radius: 20px;
      align-self: flex-start;
      border: 1px solid rgba(133, 115, 106, 0.15);
    }

    .typingdot {
      width: 9px;
      height: 9px;
      background: #aaa;
      border-radius: 50%;
      animation: typing 1.4s infinite ease-in-out;
    }

    @keyframes typing {
      0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; background: #884d27; }
    }
  </style>
</head>
<body>

  <!-- NAVBAR SECTION -->
  <div class="navbar-section">
    <header class="navbar">
      <div class="nav-container">
        <a href="index.html" class="navlogo">Moodify</a>
      </div>
      <nav class="navlinks">
        <a class="navbtn" href="index.html"> Home </a>
        <a class="navbtn" href="content.html"> Discover </a>
        <a class="navbtn" href="chatbot.html"> Chat </a>
        <a class="navbtn" href="notes.html"> Notes </a>
      </nav>
    </header>
  </div>

  <!-- CHAT SECTION -->
  <div class="maincontainer">
    <div class="chatwrapper">
      <h1 class="mainheading">AI COMPANION</h1>
      <p class="subtitletext">An empathetic intelligence here to listen, support, and guide you.</p>

      <div id="chat-box">
        <!-- MESSAGES -->
      </div>

      <div class="inputarea">
        <input type="text" id="chat-input" placeholder="Share what's on your mind..." autocomplete="off" />
        <button class="btn" id="send-btn">
          <span>Send</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/chatbot.js"></script>
</body>
</html>
