<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moodify - Your Path</title>
  <link rel="stylesheet" href="styles/style.css" />
  
  <style>
    /* PAGE SPECIFIC STYLES */
    .intentsection {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
    }

    .mainheading {
      font-family: "Newsreader", serif;
      font-size: 4.5rem;
      margin-bottom: 2rem;
      color: #1b1c1a;
      line-height: 1.05;
    }

    .subtitletext {
      color: #884d27;
      font-size: 1.4rem;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
      font-weight: 500;
    }

    .intentgrid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 3rem;
      margin-top: 3rem;
    }

    .intentcard {
      background: #ffffff;
      border: 1px solid rgba(133, 115, 106, 0.15);
      border-radius: 32px;
      padding: 3.5rem 2.5rem;
      box-shadow: 0 24px 48px rgba(27, 28, 26, 0.04);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .intentcard:hover {
      transform: translateY(-12px) scale(1.02);
      border-color: rgba(46, 125, 130, 0.3);
      box-shadow: 0 40px 100px -15px rgba(0, 0, 0, 0.08);
      background: #fffefc;
    }

    .cardtitle {
      font-size: 1.75rem;
      font-family: "Newsreader", serif;
      font-weight: 500;
      color: #1b1c1a;
      margin-bottom: 0.6rem;
    }

    .carddesc {
      opacity: 0.8;
      font-size: 0.95rem;
      text-align: center;
      line-height: 1.4;
      color: #53443c;
    }

    .intentcard:hover .cardtitle {
      color: #884d27;
    }
  </style>
</head>
<body>

  <!-- NAVBAR SECTION -->
  <div class="navbar-section">
    <header class="navbar">
      <div class="nav-container">
        <a href="index.html" class="navlogo">Moodify</a>
      </div>
      <nav class="navlinks">
        <a class="navbtn" href="index.html"> Home </a>
        <a class="navbtn" href="content.html"> Discover </a>
        <a class="navbtn" href="chatbot.html"> Chat </a>
        <a class="navbtn" href="notes.html"> Notes </a>
      </nav>
    </header>
  </div>

  <!-- INTENT SELECTION SECTION -->
  <div class="maincontainer">
    <div class="intentsection">
      <h1 class="mainheading">What space do you need?</h1>
      <p class="subtitletext" id="intent-subtitle">Analyzing your mind...</p>
      
      <div class="intentgrid" id="intent-grid">
        <!-- INTENT CARDS GENERATED BY JS -->
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/intent.js"></script>
</body>
</html>
